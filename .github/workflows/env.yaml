name: Environment variable demo
on:
    workflow_dispatch:

#  This goes to all jobs
env:
    GLOBAL_ENV: "Global value"

jobs:
    job-1:
        runs-on: ubuntu-latest

        # job level env -> goes to all steps in the job
        env:
            JOB_ENV: "Job value"
        
        steps:
            - name: print global and job values
              run: echo "Global value ${{ env.GLOBAL_ENV }} Job value ${{ env.JOB_ENV }}"
        
            - name: print step level value
            #   Step level env: only goes to this step
              env:
                STEP_ENV: "Step value"
              run: echo "Job env value ${{ env.STEP_ENV }}"

    
    job-2:
        runs-on: ubuntu-latest
        env:
            JOB2_ENV: "Job2 value"
        steps:
            - name: print global and job values
              run: echo "Global value ${{ env.GLOBAL_ENV }} Job value ${{ env.JOB2_ENV }}"

            - name: print step level value
              env:
                STEP2_ENV: "Step2 value"
              run: echo "Step level value ${{ env.STEP2_ENV }}"