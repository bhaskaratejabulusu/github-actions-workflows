name: Composite action demo
on:
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: checkout action
              uses: actions/checkout@v4
            
            - name: Wish me
              id: wish
              uses: ./.github/workflows/composite-action
              with:
                name: "Bhaskara Teja"

            - name: Check output
              run: echo "The status of the action is ${{ steps.wish.outputs.status }}"
              
        