name: Node without caching
on:
    workflow_dispatch:
jobs:
    build-app:
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v4

            - name: cache node modules
              uses: actions/cache@v4
              with: 
                path: ~/.npm
                key: npm-${{ hashFiles('**/package-lock.json') }}
                restore-keys: npm-

            - name: Install dependencies
              run: npm install

            - name: run the application
              run: node index.js
